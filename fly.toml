# Nango self-hosted server for TaxBlitz
# App URL: https://taxblitz-nango-production.up.railway.app
#
# Required secrets (set via `railway variables set -a taxblitz-nango`):
#   NANGO_DB_URL             — Postgres connection string
#   NANGO_SECRET_KEY_DEV     — generate: openssl rand -hex 32
#   NANGO_ENCRYPTION_KEY     — generate: openssl rand -hex 16

app = 'taxblitz-nango'
primary_region = 'sjc'

[build]

[env]
  SERVER_PORT        = "3003"
  NANGO_SERVER_URL   = "https://taxblitz-nango-production.up.railway.app"
  NODE_ENV           = "production"

[http_service]
  internal_port        = 3003
  force_https          = true
  auto_stop_machines   = 'off'
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ['app']

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory   = '1gb'
  cpu_kind = 'shared'
  cpus     = 1
